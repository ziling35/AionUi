  <text class="txt" x="365" y="274">REV A</text>
  <text class="txt" x="365" y="257">DWG-AX-042</text>
  <text class="small" x="255" y="280">UNITS: mm | TOL: ISO 2768-mK | MATERIAL: 6061-T6 AL</text>

