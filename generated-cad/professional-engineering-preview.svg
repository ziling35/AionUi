  <text class="title" x="300" y="58">RIGHT SIDE VIEW</text>
  <rect class="part" x="300" y="92" width="80" height="18" />
  <path class="part" d="M325 92 L325 62 L355 62 L355 92" />
  <line class="center" x1="340" y1="55" x2="340" y2="116" />
  <line class="hidden" x1="320" y1="101" x2="360" y2="101" />
