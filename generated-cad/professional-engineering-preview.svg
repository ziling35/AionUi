    <line x1="84" y1="250" x2="100" y2="234" />
    <line x1="100" y1="250" x2="116" y2="234" />
    <line x1="116" y1="250" x2="132" y2="234" />
    <line x1="132" y1="250" x2="148" y2="234" />
    <line x1="192" y1="250" x2="208" y2="234" />
    <line x1="208" y1="250" x2="224" y2="234" />
    <line x1="224" y1="250" x2="240" y2="234" />
    <line x1="240" y1="250" x2="256" y2="234" />
  </g>
  <text class="dimtxt" x="265" y="242" transform="rotate(-90 265 242)">BASE 12</text>
  <text class="dimtxt" x="215" y="216">BOSS +16</text>
  <text class="txt" x="86" y="262" fill="#b36b00">POCKETED UNDERSIDE: 3.5 WALL, 45° RIB HATCH</text>

  <!-- Notes -->
  <text class="title" x="20" y="238">GENERAL NOTES:</text>
  <text class="small" x="20" y="247">1. BREAK ALL EDGES C0.5 UNLESS OTHERWISE SPECIFIED.</text>
  <text class="small" x="20" y="254">2. CRITICAL HOLE POSITION TRUE POS 0.05 TO DATUMS A|B|C.</text>
  <text class="small" x="20" y="261">3. BLACK HARD ANODIZE, MASK LOCATING BORE Ø36 H7.</text>
  <text class="small" x="20" y="268">4. DEBURR AFTER CNC FINISHING; NO VISIBLE TOOL CHATTER.</text>
</svg>
