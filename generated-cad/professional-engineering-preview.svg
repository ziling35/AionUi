  <line class="dim" x1="260" y1="170" x2="260" y2="190" />
  <text class="dimtxt" x="158" y="194">180.00</text>
  <line class="dim" x1="65" y1="80" x2="65" y2="170" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line class="dim" x1="75" y1="80" x2="60" y2="80" />
  <line class="dim" x1="75" y1="170" x2="60" y2="170" />
  <text class="dimtxt" x="48" y="128" transform="rotate(-90 48 128)">90.00</text>
  <line class="dim" x1="110" y1="65" x2="230" y2="65" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line class="dim" x1="110" y1="80" x2="110" y2="60" />
  <line class="dim" x1="230" y1="80" x2="230" y2="60" />
  <text class="dimtxt" x="158" y="62">120 PCD-X</text>
  <line class="dim" x1="275" y1="110" x2="275" y2="140" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line class="dim" x1="260" y1="110" x2="280" y2="110" />
  <line class="dim" x1="260" y1="140" x2="280" y2="140" />
  <text class="dimtxt" x="282" y="130" transform="rotate(-90 282 130)">30 PITCH</text>

