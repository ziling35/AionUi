  <line class="center" x1="170" y1="72" x2="170" y2="178" />
  <line class="center" x1="72" y1="125" x2="268" y2="125" />
  <line class="center" x1="102" y1="110" x2="118" y2="110" />
  <line class="center" x1="110" y1="102" x2="110" y2="118" />
  <line class="center" x1="222" y1="110" x2="238" y2="110" />
  <line class="center" x1="230" y1="102" x2="230" y2="118" />
  <line class="center" x1="102" y1="140" x2="118" y2="140" />
  <line class="center" x1="110" y1="132" x2="110" y2="148" />
  <line class="center" x1="222" y1="140" x2="238" y2="140" />
  <line class="center" x1="230" y1="132" x2="230" y2="148" />

