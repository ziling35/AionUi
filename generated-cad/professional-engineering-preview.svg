<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1131" viewBox="0 0 420 297">
  <defs>
    <style>
      .sheet { fill: #fbfbf8; }
      .border { fill: none; stroke: #111; stroke-width: 0.55; }
      .thin { fill: none; stroke: #222; stroke-width: 0.35; }
      .part { fill: none; stroke: #101010; stroke-width: 0.7; }
      .heavy { fill: none; stroke: #101010; stroke-width: 1.0; }
      .center { fill: none; stroke: #1b63b7; stroke-width: 0.28; stroke-dasharray: 7 2 1.5 2; }
      .hidden { fill: none; stroke: #666; stroke-width: 0.28; stroke-dasharray: 3 2; }
      .dim { fill: none; stroke: #008a3d; stroke-width: 0.28; }
      .callout { fill: none; stroke: #b36b00; stroke-width: 0.32; }
      .hatch { stroke: #777; stroke-width: 0.22; }
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 3px; }
      .title { font-family: Arial, Helvetica, sans-serif; font-weight: 700; fill: #111; font-size: 4.2px; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 2.5px; }
      .dimtxt { font-family: Arial, Helvetica, sans-serif; fill: #008a3d; font-size: 3px; }
      .blueprint { fill: #eef5ff; opacity: 0.25; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#008a3d" />
    </marker>
    <marker id="arrowCallout" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b36b00" />
    </marker>
  </defs>

  <rect class="sheet" x="0" y="0" width="420" height="297" />
  <rect class="blueprint" x="15" y="15" width="390" height="267" />
  <rect class="border" x="10" y="10" width="400" height="277" />
  <rect class="border" x="15" y="15" width="390" height="267" />

  <!-- Title block -->
  <rect class="border" x="250" y="232" width="155" height="50" />
  <line class="thin" x1="250" y1="247" x2="405" y2="247" />
  <line class="thin" x1="250" y1="262" x2="405" y2="262" />
  <line class="thin" x1="310" y1="232" x2="310" y2="282" />
